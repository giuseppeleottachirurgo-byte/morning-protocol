<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>15' Morning Protocol</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#080809">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #080809;
            --surface: #0f0f11;
            --card: #141417;
            --card2: #1a1a1f;
            --border: #252530;
            --border2: #32323f;
            --accent: #e8ff47;
            --accent2: #ff5e3a;
            --accent3: #3affcb;
            --accent4: #a78bfa;
            --text: #ededf0;
            --muted: #5a5a6e;
            --muted2: #8888a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 400;
            min-height: 100vh;
            padding-bottom: 120px;
            overflow-x: hidden;
            line-height: 1.2;
        }

        /* Ottimizzazione per lo schermo del Pixel 10 XL Pro */
        .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 20px; }

        header { margin-bottom: 30px; padding-top: 10px; }
        .logo-area { display: flex; align-items: baseline; gap: 10px; margin-bottom: 5px; }
        .logo-main { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 2px; color: var(--accent); line-height: 1; }
        .version { font-family: 'DM+Mono', monospace; font-size: 12px; color: var(--muted2); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; }

        .day-nav { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .day-nav::-webkit-scrollbar { display: none; }
        .day-pill { background: var(--surface); border: 1px solid var(--border); padding: 8px 20px; border-radius: 100px; white-space: nowrap; font-weight: 600; color: var(--muted2); transition: 0.3s; }
        .day-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        .exc-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; transition: 0.3s; position: relative; overflow: hidden; }
        .exc-card.active { border-color: var(--accent); box-shadow: 0 10px 30px rgba(232, 255, 71, 0.05); }
        .exc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .exc-title { font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .exc-tag { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--surface); color: var(--accent3); padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }

        .timer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 15, 17, 0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 15px 20px calc(15px + env(safe-area-inset-bottom)); z-index: 1000; display: flex; align-items: center; justify-content: space-between; }
        .t-time { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; color: var(--accent); min-width: 100px; }
        .t-controls { display: flex; gap: 8px; }
        .btn { border: none; border-radius: 12px; font-weight: 700; font-family: 'Barlow Condensed'; font-size: 16px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-p { background: var(--accent); color: var(--bg); padding: 10px 25px; }
        .btn-s { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 10px 15px; }
        
        .blinking { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <h1 class="logo-main">15' PROTOCOL</h1>
            <span class="version">v2.0 PRO</span>
        </div>
        <p style="color: var(--muted2); font-size: 14px;">Ottimizzato per Google Pixel 10 XL Pro</p>
    </header>

    <div class="day-nav">
        <div class="day-pill active">LUN</div>
        <div class="day-pill">MAR</div>
        <div class="day-pill">MER</div>
        <div class="day-pill">GIO</div>
        <div class="day-pill">VEN</div>
        <div class="day-pill">SAB</div>
    </div>

    <div class="exc-card active">
        <div class="exc-header">
            <h2 class="exc-title">Push-up con elastico</h2>
            <span class="exc-tag">Pettorali / Tricipiti</span>
        </div>
        <div style="font-family: 'DM Mono', monospace; font-size: 18px; color: var(--accent);">3 Set x 12-15 Reps</div>
        <p style="margin-top: 10px; color: var(--muted2); font-size: 14px;">Mantieni il core contratto e gomiti a 45 gradi.</p>
    </div>

    <div class="exc-card">
        <div class="exc-header">
            <h2 class="exc-title">Shoulder Press</h2>
            <span class="exc-tag">Spalle</span>
        </div>
        <div style="font-family: 'DM Mono', monospace; font-size: 18px; color: var(--accent3);">3 Set x 10 Reps</div>
    </div>
</div>

<div class="timer-bar">
    <div>
        <div id="tLabel" style="font-size: 12px; color: var(--muted2); text-transform: uppercase; margin-bottom: 2px;">Rest Timer</div>
        <div id="tDisplay" class="t-time">00:00</div>
    </div>
    <div class="t-controls">
        <button class="btn btn-s" onclick="setTimer(30)">30s</button>
        <button class="btn btn-s" onclick="setTimer(60)">60s</button>
        <button id="tGo" class="btn btn-p" onclick="toggleTimer()">▶ Start</button>
    </div>
</div>

<script>
    let timerSec = 0;
    let timerInterval = null;
    let timerRunning = false;

    function fmt(s) {
        const m = Math.floor(s / 60);
        const r = s % 60;
        return `${m.toString().padStart(2,'0')}:${r.toString().padStart(2,'0')}`;
    }

    function setTimer(s) {
        clearInterval(timerInterval);
        timerRunning = false;
        timerSec = s;
        document.getElementById('tDisplay').textContent = fmt(timerSec);
        document.getElementById('tGo').textContent = '▶ Start';
    }

    function startTimer() {
        if (timerSec <= 0) return;
        timerRunning = true;
        document.getElementById('tGo').textContent = '⏸ Stop';
        timerInterval = setInterval(() => {
            timerSec--;
            document.getElementById('tDisplay').textContent = fmt(timerSec);
            if (timerSec <= 0) {
                clearInterval(timerInterval);
                timerRunning = false;
                document.getElementById('tDisplay').classList.add('blinking');
                document.getElementById('tGo').textContent = '▶ Start';
                alert("Recupero terminato!");
            }
        }, 1000);
    }

    function toggleTimer() {
        if (timerRunning) {
            clearInterval(timerInterval);
            timerRunning = false;
            document.getElementById('tGo').textContent = '▶ Start';
        } else {
            startTimer();
        }
    }
</script>

</body>
</html>
