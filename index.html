<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>15' Protocol</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#080809">
    <style>
        :root { --bg: #080809; --accent: #e8ff47; --text: #ededf0; --card: #141417; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #252530; }
        .card.active { border-color: var(--accent); }
        .timer-box { position: fixed; bottom: 0; left:0; right:0; background: #0f0f11; padding: 20px; border-top: 1px solid #252530; display: flex; justify-content: space-between; align-items: center; }
        .time { font-family: monospace; font-size: 32px; color: var(--accent); }
        .btn { background: #1a1a1f; color: white; border: 1px solid #252530; padding: 10px 15px; border-radius: 10px; font-weight: bold; }
        .btn-go { background: var(--accent); color: black; border: none; padding: 10px 25px; }
    </style>
</head>
<body>

    <h1 style="color:var(--accent); margin-bottom:20px;">15' PROTOCOL</h1>

    <div class="card" onclick="this.classList.toggle('active')">
        <h2>Push-up Elastico</h2>
        <p>3 Set x 12-15 Reps</p>
    </div>

    <div class="card" onclick="this.classList.toggle('active')">
        <h2>Shoulder Press</h2>
        <p>3 Set x 10 Reps</p>
    </div>

    <div class="timer-box">
        <div id="display" class="time">00:00</div>
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="startTimer(30)">30s</button>
            <button class="btn" onclick="startTimer(60)">60s</button>
            <button id="btnGo" class="btn btn-go" onclick="stopTimer()">Reset</button>
        </div>
    </div>

<script>
    let seconds = 0;
    let countdown = null;

    function startTimer(val) {
        clearInterval(countdown);
        seconds = val;
        updateDisplay();
        document.getElementById('btnGo').textContent = "Reset";
        
        countdown = setInterval(() => {
            seconds--;
            updateDisplay();
            if (seconds <= 0) {
                clearInterval(countdown);
                if (navigator.vibrate) navigator.vibrate(500);
                alert("Recupero terminato!");
            }
        }, 1000);
    }

    function stopTimer() {
        clearInterval(countdown);
        seconds = 0;
        updateDisplay();
    }

    function updateDisplay() {
        let m = Math.floor(seconds / 60);
        let s = seconds % 60;
        document.getElementById('display').textContent = 
            (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
    }
</script>
</body>
</html>
